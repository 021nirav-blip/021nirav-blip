<svg xmlns="http://www.w3.org/2000/svg" width="400" height="500" viewBox="0 0 400 500">
  <defs>
    <style>
      @keyframes swing {
        0% { transform: rotate(-5deg); transform-origin: 50% 0; }
        50% { transform: rotate(5deg); transform-origin: 50% 0; }
        100% { transform: rotate(-5deg); transform-origin: 50% 0; }
      }
      @keyframes shadowPulse {
        0% { opacity: 0.3; }
        50% { opacity: 0.1; }
        100% { opacity: 0.3; }
      }
      @keyframes fadeInOut {
        0%, 10% { opacity: 0; }
        15%, 40% { opacity: 1; }
        45%, 100% { opacity: 0; }
      }
      @keyframes fadeInOut2 {
        0%, 45% { opacity: 0; }
        50%, 80% { opacity: 1; }
        85%, 100% { opacity: 0; }
      }
      .web-line { stroke: rgba(255,255,255,0.5); stroke-width: 2; }
      .swinging-group { animation: swing 3s ease-in-out infinite; }
      .shadow { animation: shadowPulse 3s ease-in-out infinite; }
      .text-1 { animation: fadeInOut 10s infinite; }
      .text-2 { animation: fadeInOut2 10s infinite; }
      .text-style { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; font-size: 16px; fill: #ffcc66; text-anchor: middle; }
    </style>
  </defs>
  
  <!-- Web line -->
  <line class="web-line" x1="200" y1="0" x2="200" y2="150" />
  
  <!-- Swinging Spider-Man group -->
  <g class="swinging-group">
    <!-- Spider body -->
    <circle cx="200" cy="180" r="20" fill="#ff0000" />
    <!-- Spider head -->
    <circle cx="200" cy="160" r="15" fill="#cc0000" />
    <!-- Eyes -->
    <circle cx="195" cy="157" r="3" fill="#ffffff" />
    <circle cx="205" cy="157" r="3" fill="#ffffff" />
    <!-- Legs -->
    <line x1="180" y1="180" x2="160" y2="190" stroke="#333" stroke-width="2" />
    <line x1="220" y1="180" x2="240" y2="190" stroke="#333" stroke-width="2" />
    <line x1="180" y1="190" x2="160" y2="210" stroke="#333" stroke-width="2" />
    <line x1="220" y1="190" x2="240" y2="210" stroke="#333" stroke-width="2" />
  </g>
  
  <!-- Shadow -->
  <ellipse class="shadow" cx="200" cy="340" rx="50" ry="8" fill="#000000" />
  
  <!-- Text -->
  <text class="text-style text-1" x="200" y="380">I'm Nirav, Your Friendly</text>
  <text class="text-style text-1" x="200" y="405">Neighborhood Developer</text>
  
  <text class="text-style text-2" x="200" y="380">I make cool projects here</text>
  <text class="text-style text-2" x="200" y="405">🚀 Check them out!</text>
</svg>